<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearBudget — Budget Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header__inner">
            <a href="#" class="logo">
                <span class="logo__icon">$</span>
                Budget Tracker
            </a>
            <p class="header__month" id="currentMonth"></p>
        </div>
    </header>

    <main class="container main">
        <section class="summary" id="summary"></section>

        <section class="budget-setup card">
            <h2 class="card__title">Monthly Budget</h2>
            <form class="budget-form" id="budgetForm">
                <div class="form-group">
                    <label for="budgetAmount">Total budget</label>
                    <div class="input-prefix">
                        <span>$</span>
                        <input type="number" id="budgetAmount" min="0" step="0.01" placeholder="2000.00" required>
                    </div>
                </div>
                <button type="submit" class="btn btn--primary">Set Budget</button>
            </form>
        </section>

        <div class="grid">
            <section class="card">
                <h2 class="card__title">Add Expense</h2>
                <form class="expense-form" id="expenseForm">
                    <div class="form-group">
                        <label for="expenseDesc">Description</label>
                        <input type="text" id="expenseDesc" placeholder="e.g. Grocery run" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="expenseAmount">Amount</label>
                            <div class="input-prefix">
                                <span>$</span>
                                <input type="number" id="expenseAmount" min="0.01" step="0.01" placeholder="0.00" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="expenseCategory">Category</label>
                            <select id="expenseCategory" required>
                                <option value="Food">Food</option>
                                <option value="Transport">Transport</option>
                                <option value="Housing">Housing</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn--primary btn--full">Add Expense</button>
                </form>
            </section>

            <section class="card">
                <h2 class="card__title">By Category</h2>
                <div class="categories" id="categories"></div>
            </section>
        </div>

        <section class="card">
            <div class="card__header">
                <h2 class="card__title">Recent Expenses</h2>
                <span class="expense-count" id="expenseCount"></span>
            </div>
            <ul class="expense-list" id="expenseList"></ul>
            <p class="empty-state" id="emptyState">No expenses yet. Add your first one above.</p>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
